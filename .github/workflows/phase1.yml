name: Phase 1 ingestion checks

on:
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "supabase/**"
      - "docs/phase-1/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "wrangler.toml"
      - "vitest.config.ts"
      - ".github/workflows/phase1.yml"
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: npm install --ignore-scripts
      - run: npm run typecheck
      - run: npm test
      - run: python3 scripts/validate_phase0.py
